<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captcha Demo</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <main class="card">
    <h1>Prove you're human</h1>
    <p class="subtitle" id="captcha-subtitle">Type the characters shown in the image below.</p>

    <div class="captcha-wrapper">
      <img id="captcha-img" src="" alt="Captcha image" width="220" height="90" />
      <audio id="captcha-audio" controls hidden aria-label="Audio captcha"></audio>
      <button type="button" id="refresh-btn" class="btn-icon" title="Get a new captcha" aria-label="Refresh captcha">
        &#x21bb;
      </button>
    </div>

    <button type="button" id="toggle-mode-btn" class="btn-link">
      Can't see the image? Try audio captcha
    </button>

    <form id="captcha-form" novalidate>
      <label for="captcha-input" class="sr-only">Captcha answer</label>
      <input
        type="text"
        id="captcha-input"
        name="answer"
        placeholder="Enter the characters"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
        maxlength="20"
      />
      <p id="error-msg" class="error" hidden></p>
      <button type="submit" class="btn-primary">Submit</button>
    </form>
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
