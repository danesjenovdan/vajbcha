<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Test</title>
  <!-- <link rel="stylesheet" href="/static/css/style.css" /> -->
  <style>
    img { display: block; border: 1px solid #ccc; border-radius: 6px; }
    .refresh-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Image Test</h1>
    <img id="test-img" src="/static/test.png" alt="test image" />
    <div class="refresh-row">
      <button class="btn-primary" onclick="reload()">Reload</button>
      <span id="ts" style="font-size:0.8rem;color:#888;"></span>
    </div>
  </main>

  <script>
    function reload() {
      const ts = Date.now();
      document.getElementById("test-img").src = "/static/test.png?t=" + ts;
      document.getElementById("ts").textContent = "reloaded at " + new Date(ts).toLocaleTimeString();
    }
  </script>
</body>
</html>
