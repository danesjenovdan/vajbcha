<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>vajbcha test</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-size: 14px;
        font-family: sans-serif;
      }
      h1 {
        text-align: center;
      }
      .form-container {
        max-width: 425px;
        margin: 0 auto;
        padding: 1rem;
        border: 1px solid CanvasText;
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.5;
      }
      .form-container .form-field {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
      }
      .form-container .form-field label {
        margin-bottom: 0.25rem;
      }
      .form-container .form-field input {
        padding: 5px;
        font: inherit;
      }
      .form-container button {
        display: block;
        width: 100%;
        padding: 0.5rem;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>vajbcha test</h1>

    <div class="form-container">
      <form action="javascript;">
        <div class="form-field">
          <label for="username_1">Username:</label>
          <input
            type="text"
            id="username_1"
            name="username"
            value="john"
            disabled
          />
        </div>
        <div class="form-field">
          <label for="password_1">Password:</label>
          <input
            type="password"
            id="password_1"
            name="password"
            value="hunter2"
            disabled
          />
        </div>
        <div class="form-field captcha-container">
          <label for="">CAPTCHA:</label>
          <div class="captcha">
            <script
              src="/js/vajbcha.js"
              data-input-name="captcha-test"
              data-base-url="http://localhost:8000"
              data-locale="sl"
            ></script>
          </div>
        </div>
        <button type="submit" value="submit_1">Submit</button>
      </form>

      <script>
        const form = document.querySelector("form");
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          window.vajbcha["captcha-test"].reload();
        });
      </script>
    </div>
  </body>
</html>
