name: Build and publish Docker image
on:
  push:
    branches:
      - "k8s"
jobs:
  push-to-registry:
    name: Build and push Docker image to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Scaleway
        uses: docker/login-action@v4
        with:
          registry: rg.fr-par.scw.cloud/djnd
          username: nologin
          password: ${{ secrets.SCW_SECRET_TOKEN }}

      - name: Build and push vajbcha
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./vajbcha
          push: true
          tags: |
            rg.fr-par.scw.cloud/djnd/vajbcha:${{ github.sha }}
            rg.fr-par.scw.cloud/djnd/vajbcha:latest

      - name: Build and push nginx
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./nginx
          push: true
          tags: |
            rg.fr-par.scw.cloud/djnd/vajbcha-nginx:${{ github.sha }}
            rg.fr-par.scw.cloud/djnd/vajbcha-nginx:latest

      - name: Update image versions in kustomize/kustomization.yaml
        run: |
          sed -i "s/newTag: .*\+/newTag\: '${{ github.sha }}'/" kustomize/kustomization.yaml

      - name: Commit and push new image versions
        uses: EndBug/add-and-commit@v10
        with:
          add: .
          message: "Update image versions in kustomize/kustomization.yaml"
